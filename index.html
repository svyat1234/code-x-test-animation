<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code-X</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --neon-blue: #14CF93;
            --deep-space: #010103;
            --glow-gold: #fff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #010103;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0;
            transition: opacity 2.5s linear;
        }

        #canvas-container.loaded {
            opacity: 1;
        }

        /* display:none у canvas иногда ломает растр при отрисовке SVG в 2D — прячем за экраном */
        #text-canvas {
            position: fixed;
            left: -9999px;
            top: 0;
            width: 4px;
            height: 4px;
            opacity: 0;
            pointer-events: none;
        }

        .buttons {
            position: fixed;
            bottom: 300px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 1000;
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transition: opacity 0.45s ease, visibility 0.45s ease;
        }

        .buttons.buttons--concealed {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .button {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: transparent;
            color: #14cf94;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 100;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: none;
            border-radius: 0;
            padding-left: 5px;
            transition: color 0.3s ease;
        }
        
        .button:hover {
            color: #ffffff;
        }

        .admin-modal {
            position: fixed;
            top: 0;
            left: 50%;
            right: 0;
            width: auto;
            height: 100%;
            z-index: 1100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 32px clamp(20px, 4vw, 56px) 32px clamp(28px, 6vw, 72px);
            background: rgba(1, 1, 3, 0.82);
            border-left: 1px solid rgba(20, 207, 147, 0.25);
            box-shadow: -16px 0 48px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(18px);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateX(28px);
            transition: opacity 0.45s ease, visibility 0.45s ease, transform 0.45s ease;
        }

        .admin-modal.admin-modal--visible {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateX(0);
        }

        .admin-modal__inner {
            width: 100%;
            max-width: min(400px, 86%);
            position: relative;
        }

        .admin-modal__back,
        .projects-panel__back {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            margin: 0 0 12px -6px;
            padding: 0;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: rgba(20, 207, 147, 0.85);
            cursor: pointer;
            transition: color 0.2s ease, background 0.2s ease;
        }

        .projects-panel__back {
            margin: 0 0 12px auto;
        }

        .admin-modal__back:hover,
        .projects-panel__back:hover {
            color: #fff;
        }

        .admin-modal__back svg,
        .projects-panel__back svg {
            width: 28px;
            height: auto;
            display: block;
        }

        .admin-modal__back path,
        .projects-panel__back path {
            fill: currentColor;
        }

        .admin-modal__inner h2 {
            color: #fff;
            font-size: 1.05rem;
            font-weight: 600;
            line-height: 1.35;
            margin-bottom: 22px;
        }

        .admin-modal__inner label {
            display: block;
            color: rgba(255, 255, 255, 0.75);
            font-size: 12px;
            margin-bottom: 6px;
            letter-spacing: 0.04em;
        }

        .admin-modal__inner input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(0, 0, 0, 0.35);
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .admin-modal__inner input:focus {
            border-color: rgba(20, 207, 147, 0.55);
        }

        .admin-modal__submit {
            width: 100%;
            margin-top: 8px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #14CF93;
            color: #010103;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s ease, filter 0.2s ease;
        }

        .admin-modal__submit:hover {
            filter: brightness(1.08);
        }

        .projects-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 50%;
            width: auto;
            height: 100%;
            z-index: 1090;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 32px clamp(28px, 6vw, 72px) 32px clamp(20px, 4vw, 56px);
            background: rgba(1, 1, 3, 0.82);
            border-right: 1px solid rgba(20, 207, 147, 0.25);
            box-shadow: 16px 0 48px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(18px);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateX(-28px);
            transition: opacity 0.45s ease, visibility 0.45s ease, transform 0.45s ease;
        }

        .projects-panel.projects-panel--visible {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateX(0);
        }

        .projects-panel__inner {
            width: 100%;
            max-width: min(400px, 86%);
            position: relative;
        }

        .projects-panel__inner h2 {
            color: #fff;
            font-size: 1.05rem;
            font-weight: 600;
            line-height: 1.35;
            margin-bottom: 20px;
        }

        .projects-panel__hint {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            margin-bottom: 20px;
            letter-spacing: 0.03em;
        }

        .projects-panel__list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .projects-row {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 16px;
            padding: 14px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.28);
            text-decoration: none;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
        }

        .projects-row:hover {
            border-color: rgba(20, 207, 147, 0.45);
            background: rgba(20, 207, 147, 0.08);
            color: #fff;
        }

        .projects-row__icon {
            width: 25px;
            height: 25px;
            flex-shrink: 0;
            object-fit: contain;
        }

        .projects-row__label {
            flex: 1;
            text-align: left;
        }

    </style>
</head>
<body>
    <canvas id="text-canvas"></canvas>
    <div id="canvas-container"></div>

    <div class="buttons buttons--concealed">
        <button type="button" class="button projects-button">Projects</button>
        <button type="button" class="button enter-button">Enter admin panel</button>
    </div>

    <aside class="admin-modal" id="admin-modal" aria-hidden="true">
        <div class="admin-modal__inner">
            <button type="button" class="admin-modal__back" id="admin-modal-back" aria-label="Назад">
                <svg xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" image-rendering="optimizeQuality" fill-rule="evenodd" clip-rule="evenodd" viewBox="0 0 512 243.58" aria-hidden="true">
                    <path fill-rule="nonzero" d="M138.43 243.58 0 122.84 140.47 0l20.92 23.91-94.92 83 445.53-.42v31.75l-445.54.41 92.89 81.02z"/>
                </svg>
            </button>
            <h2>Вход в администрационную панель code-x</h2>
            <form id="admin-login-form" autocomplete="off">
                <label for="admin-login">Логин</label>
                <input id="admin-login" name="login" type="text" placeholder="Логин">
                <label for="admin-password">Пароль</label>
                <input id="admin-password" name="password" type="password" placeholder="Пароль">
                <button type="submit" class="admin-modal__submit">Войти</button>
            </form>
        </div>
    </aside>

    <aside class="projects-panel" id="projects-panel" aria-hidden="true">
        <div class="projects-panel__inner">
            <button type="button" class="projects-panel__back" id="projects-panel-back" aria-label="Назад">
                <svg xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" image-rendering="optimizeQuality" fill-rule="evenodd" clip-rule="evenodd" viewBox="0 0 512 243.58" aria-hidden="true">
                    <path fill-rule="nonzero" d="M138.43 243.58 0 122.84 140.47 0l20.92 23.91-94.92 83 445.53-.42v31.75l-445.54.41 92.89 81.02z"/>
                </svg>
            </button>
            <h2>Проекты</h2>
            <nav class="projects-panel__list" aria-label="Список проектов">
                <a class="projects-row" href="https://furryuser.ru/" target="_blank" rel="noopener noreferrer">
                    <img class="projects-row__icon" src="./images/code-x-1.svg" width="40" height="40" alt="">
                    <span class="projects-row__label">Code-X</span>
                </a>
                <a class="projects-row" href="https://overcourse.ru/" target="_blank" rel="noopener noreferrer">
                    <img class="projects-row__icon" src="./images/Overcourse-icon 1.svg" width="40" height="40" alt="">
                    <span class="projects-row__label">Overcourse</span>
                </a>
                <a class="projects-row" href="https://top-works.ru/" target="_blank" rel="noopener noreferrer">
                    <img class="projects-row__icon" src="./images/Top-works.svg" width="40" height="40" alt="">
                    <span class="projects-row__label">Top-works</span>
                </a>
                <a class="projects-row" href="https://www.checkerr.ru/" target="_blank" rel="noopener noreferrer">
                    <img class="projects-row__icon" src="./images/Checkerr.svg" width="40" height="40" alt="">
                    <span class="projects-row__label">Checkerr</span>
                </a>
            </nav>
        </div>
    </aside>

    <script>
        const ACCENT_HEX = '#14CF93';

        const LOGO_SVG_URL = './images/code-x-logo.svg';
        const LOGO_VIEWBOX_W = 158;
        const LOGO_VIEWBOX_H = 43;
        const LOGO_RASTER_WIDTH_FRACTION = 0.9;
        const LOGO_RASTER_MAX_WIDTH_PX = 2400;

        const textCanvas = document.getElementById('text-canvas');
        const tCtx = textCanvas.getContext('2d', { willReadFrequently: true });

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({
            antialias: true,
            alpha: true,
            powerPreference: 'high-performance'
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const particleCount = (function resolveParticleCount() {
            const max = 45000;
            const w = window.innerWidth;
            if (w < 480) return Math.min(max, 22000);
            if (w < 900) return Math.min(max, 32000);
            return max;
        })();
        const positions = new Float32Array(particleCount * 3);
        const targetPositions = new Float32Array(particleCount * 3);
        const velocities = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const digits = new Float32Array(particleCount);
        const floatPhase = new Float32Array(particleCount);
        const geometry = new THREE.BufferGeometry();

        function makeDigitAtlasTexture() {
            const c = document.createElement('canvas');
            c.width = 256;
            c.height = 128;
            const ctx = c.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('0', c.width * 0.25, c.height * 0.5);
            ctx.fillText('1', c.width * 0.75, c.height * 0.5);
            const tex = new THREE.CanvasTexture(c);
            tex.minFilter = THREE.LinearFilter;
            tex.magFilter = THREE.LinearFilter;
            return tex;
        }

        const digitMap = makeDigitAtlasTexture();

        let mouse = new THREE.Vector3(-1000, -1000, 0);
        let floatBlend = 0;

        /** Кнопки внизу показываем только после того, как частицы почти сошлись с целью. */
        let revealButtonsAfterLogoSettled = true;
        let buttonsRevealSettleStreak = 0;
        /** Смещение к «дыханию» не входит в базовые targetPositions — сравнение с tx даёт вечный лаг; меряем до базовой формы. */
        const BUTTONS_REVEAL_RMS = 1.35;
        const BUTTONS_REVEAL_STREAK_FRAMES = 28;
        /** Если метрика не сработает (редкий кейс), всё равно показать кнопки. */
        let revealButtonsWaitUntil = 0;
        const BUTTONS_REVEAL_FALLBACK_MS = 16000;

        /** Только первая сборка логотипа при загрузке — медленный lerp; после любого действия — быстрее (слова и возврат к лого). */
        let useIntroParticleMorphLerp = true;
        const PARTICLE_LERP_INTRO = 0.015;
        const PARTICLE_LERP_INTERACTIVE = 0.025;

        const baseColor = new THREE.Color(ACCENT_HEX);
        const goldColor = new THREE.Color(0xffffff);

        function fillTargetsFromRasterPoints(points) {
            if (points.length === 0) {
                points.push({ x: 0, y: 0 });
            }
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                /* Выбираем случайную точку, чтобы равномерно покрыть всю картинку,
                   если точек в SVG больше, чем частиц (иначе была бы только верхняя половина) */
                const p = points[Math.floor(Math.random() * points.length)];
                const noise = 0.5;
                targetPositions[i3] = p.x + (Math.random() - 0.5) * noise;
                targetPositions[i3 + 1] = p.y + (Math.random() - 0.5) * noise;
                targetPositions[i3 + 2] = (Math.random() - 0.5) * noise;
            }
        }

        function isLogoPixel(pixels, i4) {
            const r = pixels[i4];
            const g = pixels[i4 + 1];
            const b = pixels[i4 + 2];
            const a = pixels[i4 + 3];
            if (a < 50) return false;
            if (r > 238 && g > 238 && b > 238) return false;
            if (g < 50) return false;
            if (g < r + 14) return false;
            if (r > 140) return false;
            return true;
        }

        async function rasterizeSvgToPoints(svgUrl) {
            const res = await fetch(svgUrl, { cache: 'force-cache' });
            if (!res.ok) {
                throw new Error('SVG fetch ' + res.status);
            }
            const svgText = await res.text();

            const wPx = Math.min(
                Math.round(window.innerWidth * LOGO_RASTER_WIDTH_FRACTION),
                LOGO_RASTER_MAX_WIDTH_PX
            );
            const widthPx = Math.max(80, wPx);
            const heightPx = Math.round(widthPx * (LOGO_VIEWBOX_H / LOGO_VIEWBOX_W));

            const doc = new DOMParser().parseFromString(svgText, 'image/svg+xml');
            const err = doc.querySelector('parsererror');
            if (err) {
                throw new Error('SVG parse error');
            }
            const svg = doc.documentElement;
            if (!svg.getAttribute('xmlns')) {
                svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
            }
            svg.setAttribute('width', String(widthPx));
            svg.setAttribute('height', String(heightPx));
            svg.setAttribute('viewBox', `0 0 ${LOGO_VIEWBOX_W} ${LOGO_VIEWBOX_H}`);
            svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

            const serialized = new XMLSerializer().serializeToString(svg);
            const blob = new Blob([serialized], { type: 'image/svg+xml;charset=utf-8' });

            textCanvas.width = widthPx;
            textCanvas.height = heightPx;
            tCtx.clearRect(0, 0, widthPx, heightPx);

            const objUrl = URL.createObjectURL(blob);
            const img = new Image();
            await new Promise((resolve, reject) => {
                img.onload = () => resolve();
                img.onerror = () => reject(new Error('Не удалось отрисовать SVG в Image'));
                img.src = objUrl;
            });
            if (img.decode) {
                try {
                    await img.decode();
                } catch (e) { /* ignore */ }
            }
            tCtx.drawImage(img, 0, 0, widthPx, heightPx);
            URL.revokeObjectURL(objUrl);

            const imageData = tCtx.getImageData(0, 0, widthPx, heightPx);
            const pixels = imageData.data;
            const points = [];

            const maxWorldWidth = 140;
            let scale = 0.6;
            if ((widthPx * scale) > maxWorldWidth) {
                scale = maxWorldWidth / widthPx;
            }

            function pushPointsFromMask(maskFn) {
                points.length = 0;
                for (let y = 0; y < heightPx; y += 1) {
                    for (let x = 0; x < widthPx; x += 1) {
                        const i4 = (y * widthPx + x) * 4;
                        if (maskFn(pixels, i4)) {
                            points.push({
                                x: (x - widthPx / 2) * scale,
                                y: (heightPx / 2 - y) * scale
                            });
                        }
                    }
                }
            }

            pushPointsFromMask(isLogoPixel);

            if (points.length < 80) {
                pushPointsFromMask(function alphaNotWhite(px, i4) {
                    const r = px[i4];
                    const g = px[i4 + 1];
                    const b = px[i4 + 2];
                    const a = px[i4 + 3];
                    if (a < 52) return false;
                    if (r > 235 && g > 235 && b > 235) return false;
                    return true;
                });
            }

            fillTargetsFromRasterPoints(points);
        }

        /**
         * Вертикальное слово в мировых координатах — те же частицы, новые targetPositions.
         * @param {string} word — посимвольно сверху вниз
         * @param {number} worldCenterX — смещение столбца по X (слева от центра отрицательное, справа положительное)
         * @param {{ fontSize?: number, lineGapMult?: number, maxWorldHeight?: number, pad?: number }} [opts]
         */
        function buildTargetsVerticalWord(word, worldCenterX, opts) {
            const fontSize = opts && opts.fontSize != null ? opts.fontSize : 152;
            const lineGapMult = opts && opts.lineGapMult != null ? opts.lineGapMult : 0.86;
            const maxWorldHeight = opts && opts.maxWorldHeight != null ? opts.maxWorldHeight : 92;
            const pad = opts && opts.pad != null ? opts.pad : 28;
            const lineGap = fontSize * lineGapMult;

            tCtx.font = `bold ${fontSize}px Arial`;
            let maxCharW = 0;
            for (let ci = 0; ci < word.length; ci++) {
                maxCharW = Math.max(maxCharW, tCtx.measureText(word[ci]).width);
            }

            const widthPx = Math.ceil(maxCharW + pad * 2);
            const heightPx = Math.ceil(word.length * lineGap + pad * 2);

            textCanvas.width = widthPx;
            textCanvas.height = heightPx;

            /* Прозрачный фон — иначе маска по alpha дала бы сплошной прямоугольник. */
            tCtx.clearRect(0, 0, widthPx, heightPx);
            tCtx.fillStyle = '#ffffff';
            tCtx.textAlign = 'center';
            tCtx.textBaseline = 'middle';
            tCtx.font = `bold ${fontSize}px Arial`;

            let y = pad + lineGap * 0.5;
            for (let ci = 0; ci < word.length; ci++) {
                tCtx.fillText(word[ci], widthPx / 2, y);
                y += lineGap;
            }

            const imageData = tCtx.getImageData(0, 0, widthPx, heightPx);
            const pixels = imageData.data;
            const points = [];

            let scale = maxWorldHeight / heightPx;
            if (scale > 0.95) scale = 0.95;

            const worldCenterY = 0;

            for (let py = 0; py < heightPx; py += 1) {
                for (let px = 0; px < widthPx; px += 1) {
                    const i4 = (py * widthPx + px) * 4;
                    const a = pixels[i4 + 3];
                    const r = pixels[i4];
                    const g = pixels[i4 + 1];
                    const b = pixels[i4 + 2];
                    if (a > 128 && r + g + b > 380) {
                        points.push({
                            x: (px - widthPx / 2) * scale + worldCenterX,
                            y: (heightPx / 2 - py) * scale + worldCenterY
                        });
                    }
                }
            }

            fillTargetsFromRasterPoints(points);
        }

        function buildTargetsAdminVertical() {
            buildTargetsVerticalWord('ADMIN', -26, {
                fontSize: 152,
                lineGapMult: 0.86,
                maxWorldHeight: 92,
                pad: 28
            });
        }

        function buildTargetsProjectsVertical() {
            buildTargetsVerticalWord('PROJECTS', 28, {
                fontSize: 100,
                lineGapMult: 0.84,
                maxWorldHeight: 102,
                pad: 22
            });
        }

        const adminModal = document.getElementById('admin-modal');
        const adminForm = document.getElementById('admin-login-form');
        const adminModalBack = document.getElementById('admin-modal-back');
        const projectsPanel = document.getElementById('projects-panel');
        const projectsPanelBack = document.getElementById('projects-panel-back');
        const buttonsBar = document.querySelector('.buttons');

        function setProjectsPanelOpen(open) {
            projectsPanel.classList.toggle('projects-panel--visible', open);
            projectsPanel.setAttribute('aria-hidden', open ? 'false' : 'true');
        }

        function setButtonsBarConcealed(concealed) {
            buttonsBar.classList.toggle('buttons--concealed', concealed);
        }

        function hideAdminModalOnly() {
            adminModal.classList.remove('admin-modal--visible');
            adminModal.setAttribute('aria-hidden', 'true');
        }

        async function leaveAdminPanel() {
            const wasAdminOpen = adminModal.classList.contains('admin-modal--visible');
            hideAdminModalOnly();
            floatBlend = 0;
            if (!wasAdminOpen) {
                return;
            }
            useIntroParticleMorphLerp = false;
            revealButtonsAfterLogoSettled = true;
            setButtonsBarConcealed(true);
            buttonsRevealSettleStreak = 0;
            revealButtonsWaitUntil = performance.now() + BUTTONS_REVEAL_FALLBACK_MS;
            try {
                await rasterizeSvgToPoints(LOGO_SVG_URL);
            } catch (err) {
                console.error(err);
            }
            buttonsRevealSettleStreak = 0;
        }

        function openProjectsPanelVisual() {
            useIntroParticleMorphLerp = false;
            revealButtonsAfterLogoSettled = false;
            revealButtonsWaitUntil = 0;
            setButtonsBarConcealed(true);
            buildTargetsProjectsVertical();
            floatBlend = 0;
        }

        async function leaveProjectsPanel() {
            setProjectsPanelOpen(false);
            floatBlend = 0;
            useIntroParticleMorphLerp = false;
            revealButtonsAfterLogoSettled = true;
            setButtonsBarConcealed(true);
            buttonsRevealSettleStreak = 0;
            revealButtonsWaitUntil = performance.now() + BUTTONS_REVEAL_FALLBACK_MS;
            try {
                await rasterizeSvgToPoints(LOGO_SVG_URL);
            } catch (err) {
                console.error(err);
            }
            buttonsRevealSettleStreak = 0;
        }

        document.querySelector('.enter-button').addEventListener('click', () => {
            setProjectsPanelOpen(false);
            useIntroParticleMorphLerp = false;
            revealButtonsAfterLogoSettled = false;
            revealButtonsWaitUntil = 0;
            setButtonsBarConcealed(true);
            buildTargetsAdminVertical();
            floatBlend = 0;
            adminModal.classList.add('admin-modal--visible');
            adminModal.setAttribute('aria-hidden', 'false');
        });

        document.querySelector('.projects-button').addEventListener('click', async () => {
            if (projectsPanel.classList.contains('projects-panel--visible')) {
                await leaveProjectsPanel();
                return;
            }
            if (adminModal.classList.contains('admin-modal--visible')) {
                hideAdminModalOnly();
                openProjectsPanelVisual();
                setProjectsPanelOpen(true);
                return;
            }
            openProjectsPanelVisual();
            setProjectsPanelOpen(true);
        });

        projectsPanelBack.addEventListener('click', () => {
            leaveProjectsPanel();
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && projectsPanel.classList.contains('projects-panel--visible')) {
                leaveProjectsPanel();
            }
        });

        adminModalBack.addEventListener('click', () => {
            leaveAdminPanel();
        });

        adminForm.addEventListener('submit', (e) => {
            e.preventDefault();
        });

        for (let i = 0; i < particleCount; i++) {
            const i3 = i * 3;
            positions[i3] = (Math.random() - 0.5) * 1200;
            positions[i3 + 1] = (Math.random() - 0.5) * 1200;
            positions[i3 + 2] = (Math.random() - 0.5) * 1200;

            colors[i3] = baseColor.r;
            colors[i3 + 1] = baseColor.g;
            colors[i3 + 2] = baseColor.b;

            digits[i] = Math.random() < 0.5 ? 0 : 1;
            floatPhase[i] = Math.random() * Math.PI * 2;
        }

        let pointsObj = null;

        async function startScene() {
            try {
                await rasterizeSvgToPoints(LOGO_SVG_URL);
            } catch (err) {
                console.error('Логотип SVG:', err);
                fillTargetsFromRasterPoints([{ x: 0, y: 0 }]);
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('digit', new THREE.BufferAttribute(digits, 1));

            const digitMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    map: { value: digitMap },
                    size: { value: 14 }
                },
                vertexShader: `
                    attribute vec3 color;
                    attribute float digit;
                    varying vec3 vColor;
                    varying float vDigit;
                    uniform float size;
                    void main() {
                        vColor = color;
                        vDigit = digit;
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = size * (300.0 / -mvPosition.z);
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    uniform sampler2D map;
                    varying vec3 vColor;
                    varying float vDigit;
                    void main() {
                        float u = vDigit * 0.5 + gl_PointCoord.x * 0.5;
                        vec2 uv = vec2(u, 1.0 - gl_PointCoord.y);
                        vec4 tex = texture2D(map, uv);
                        if (tex.a < 0.15) discard;
                        gl_FragColor = vec4(tex.rgb * vColor, tex.a * 0.85);
                    }
                `,
                transparent: true,
                blending: THREE.NormalBlending,
                depthWrite: false
            });

            const material = digitMaterial;
            pointsObj = new THREE.Points(geometry, material);
            scene.add(pointsObj);

            animate();

            // Плавное появление канваса из блюра
            requestAnimationFrame(() => {
                document.getElementById('canvas-container').classList.add('loaded');
            });

            if (revealButtonsAfterLogoSettled) {
                revealButtonsWaitUntil = performance.now() + BUTTONS_REVEAL_FALLBACK_MS;
            }
        }

        camera.position.z = 100;

        const mouseRay = new THREE.Vector3();
        const mouseDir = new THREE.Vector3();

        window.addEventListener('mousemove', (e) => {
            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

            mouseRay.set(x, y, 0.5);
            mouseRay.unproject(camera);
            mouseDir.copy(mouseRay).sub(camera.position).normalize();
            const dz = mouseDir.z;
            if (Math.abs(dz) < 0.06) {
                return;
            }
            const t = -camera.position.z / dz;
            if (t <= 0 || t > 600 || !Number.isFinite(t)) {
                return;
            }
            mouse.copy(camera.position).addScaledVector(mouseDir, t);
        });

        function animate() {
            requestAnimationFrame(animate);
            if (document.hidden) return;

            const posAttr = geometry.attributes.position;
            const colAttr = geometry.attributes.color;
            const posArr = posAttr.array;
            const colArr = colAttr.array;

            const mouseInfluenceRadius = 10;
            const mouseInfluenceRadiusSq = mouseInfluenceRadius * mouseInfluenceRadius;
            const mousePushStrength = 0.88;
            const mouseVelocityDamping = 0.9;

            /* Первая сборка лого при загрузке — PARTICLE_LERP_INTRO; после кнопок «назад» / админ / проекты — быстрее. */
            const currentLerpSpeed = useIntroParticleMorphLerp ? PARTICLE_LERP_INTRO : PARTICLE_LERP_INTERACTIVE;
            const friction = 0.95;

            if (floatBlend < 1) {
                floatBlend = Math.min(1, floatBlend + 0.0028);
            }
            const tFloat = performance.now() * 0.001;

            const br = baseColor.r;
            const bg = baseColor.g;
            const bb = baseColor.b;
            const gr = goldColor.r;
            const gg = goldColor.g;
            const gb = goldColor.b;

            let settleErrSum = 0;

            for (let i = 0, i3 = 0; i < particleCount; i++, i3 += 3) {
                const bx = targetPositions[i3];
                const by = targetPositions[i3 + 1];
                const bz = targetPositions[i3 + 2];
                let tx = bx;
                let ty = by;
                let tz = bz;

                if (floatBlend > 0) {
                    const ph = floatPhase[i];
                    const w = floatBlend;
                    const ampXY = 0.8;
                    const ampZ = 0.14;
                    tx += (Math.sin(tFloat * 1.65 + ph) + Math.sin(tFloat * 0.72 + ph * 2.7) * 0.35) * ampXY * w;
                    ty += (Math.cos(tFloat * 1.42 + ph * 1.85) + Math.sin(tFloat * 0.55 + ph * 1.1) * 0.3) * ampXY * w;
                    tz += Math.sin(tFloat * 1.05 + ph * 0.65) * ampZ * w;
                }

                const dx = posArr[i3] - mouse.x;
                const dy = posArr[i3 + 1] - mouse.y;
                const dz = posArr[i3 + 2] - mouse.z;
                const distSq = dx * dx + dy * dy + dz * dz;

                if (distSq < mouseInfluenceRadiusSq && distSq > 1e-10) {
                    const dist = Math.sqrt(distSq);
                    const force = (mouseInfluenceRadius - dist) / mouseInfluenceRadius;
                    const invDist = 1 / dist;
                    velocities[i3] += dx * invDist * force * mousePushStrength;
                    velocities[i3 + 1] += dy * invDist * force * mousePushStrength;
                    velocities[i3 + 2] += dz * invDist * force * mousePushStrength;
                    velocities[i3] *= mouseVelocityDamping;
                    velocities[i3 + 1] *= mouseVelocityDamping;
                    velocities[i3 + 2] *= mouseVelocityDamping;

                    colArr[i3] += (gr - colArr[i3]) * 0.2;
                    colArr[i3 + 1] += (gg - colArr[i3 + 1]) * 0.2;
                    colArr[i3 + 2] += (gb - colArr[i3 + 2]) * 0.2;
                } else {
                    colArr[i3] += (br - colArr[i3]) * 0.05;
                    colArr[i3 + 1] += (bg - colArr[i3 + 1]) * 0.05;
                    colArr[i3 + 2] += (bb - colArr[i3 + 2]) * 0.05;
                }

                velocities[i3] *= friction;
                velocities[i3 + 1] *= friction;
                velocities[i3 + 2] *= friction;

                posArr[i3] += velocities[i3];
                posArr[i3 + 1] += velocities[i3 + 1];
                posArr[i3 + 2] += velocities[i3 + 2];

                posArr[i3] += (tx - posArr[i3]) * currentLerpSpeed;
                posArr[i3 + 1] += (ty - posArr[i3 + 1]) * currentLerpSpeed;
                posArr[i3 + 2] += (tz - posArr[i3 + 2]) * currentLerpSpeed;

                const sx = posArr[i3] - bx;
                const sy = posArr[i3 + 1] - by;
                const sz = posArr[i3 + 2] - bz;
                settleErrSum += sx * sx + sy * sy + sz * sz;
            }

            if (revealButtonsAfterLogoSettled) {
                if (revealButtonsWaitUntil > 0 && performance.now() >= revealButtonsWaitUntil) {
                    setButtonsBarConcealed(false);
                    revealButtonsAfterLogoSettled = false;
                    buttonsRevealSettleStreak = 0;
                    revealButtonsWaitUntil = 0;
                } else {
                    const rms = Math.sqrt(settleErrSum / particleCount);
                    if (rms < BUTTONS_REVEAL_RMS) {
                        buttonsRevealSettleStreak += 1;
                        if (buttonsRevealSettleStreak >= BUTTONS_REVEAL_STREAK_FRAMES) {
                            setButtonsBarConcealed(false);
                            revealButtonsAfterLogoSettled = false;
                            buttonsRevealSettleStreak = 0;
                            revealButtonsWaitUntil = 0;
                        }
                    } else {
                        buttonsRevealSettleStreak = 0;
                    }
                }
            }

            posAttr.needsUpdate = true;
            colAttr.needsUpdate = true;

            if (pointsObj) {
                pointsObj.rotation.y *= 0.9;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('load', () => {
            startScene();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
