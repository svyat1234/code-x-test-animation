<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code-X</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --deep-space: #010103;
            --glow-gold: #ffdd00;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--deep-space);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #text-canvas {
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="text-canvas"></canvas>
    <div id="canvas-container"></div>

    <script>
        const DISPLAY_TEXT = 'Code-X';

        const textCanvas = document.getElementById('text-canvas');
        const tCtx = textCanvas.getContext('2d', { willReadFrequently: true });

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const particleCount = 45000;
        const positions = new Float32Array(particleCount * 3);
        const targetPositions = new Float32Array(particleCount * 3);
        const velocities = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const geometry = new THREE.BufferGeometry();

        let isInitialLoad = true;
        let mouse = new THREE.Vector3(-1000, -1000, 0);

        const baseColor = new THREE.Color(0x00f2ff);
        const goldColor = new THREE.Color(0xffdd00);

        function textToPoints(text) {
            const fontSize = 100;
            tCtx.font = `bold ${fontSize}px Arial`;

            const metrics = tCtx.measureText(text);
            const textWidth = Math.ceil(metrics.width) + 40;
            const textHeight = fontSize * 1.5;

            textCanvas.width = textWidth;
            textCanvas.height = textHeight;

            tCtx.fillStyle = 'white';
            tCtx.font = `bold ${fontSize}px Arial`;
            tCtx.textAlign = 'center';
            tCtx.textBaseline = 'middle';
            tCtx.clearRect(0, 0, textCanvas.width, textCanvas.height);
            tCtx.fillText(text, textCanvas.width / 2, textCanvas.height / 2);

            const imageData = tCtx.getImageData(0, 0, textCanvas.width, textCanvas.height);
            const pixels = imageData.data;
            const points = [];

            const maxWorldWidth = 140;
            let scale = 0.6;
            if ((textWidth * scale) > maxWorldWidth) {
                scale = maxWorldWidth / textWidth;
            }

            for (let y = 0; y < textCanvas.height; y += 1) {
                for (let x = 0; x < textCanvas.width; x += 1) {
                    const alpha = pixels[(y * textCanvas.width + x) * 4 + 3];
                    if (alpha > 128) {
                        points.push({
                            x: (x - textCanvas.width / 2) * scale,
                            y: (textCanvas.height / 2 - y) * scale
                        });
                    }
                }
            }

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const p = points[i % points.length];
                const noise = 0.5;
                targetPositions[i3] = p.x + (Math.random() - 0.5) * noise;
                targetPositions[i3 + 1] = p.y + (Math.random() - 0.5) * noise;
                targetPositions[i3 + 2] = (Math.random() - 0.5) * noise;
            }
        }

        for (let i = 0; i < particleCount; i++) {
            const i3 = i * 3;
            positions[i3] = (Math.random() - 0.5) * 1200;
            positions[i3 + 1] = (Math.random() - 0.5) * 1200;
            positions[i3 + 2] = (Math.random() - 0.5) * 1200;

            colors[i3] = baseColor.r;
            colors[i3 + 1] = baseColor.g;
            colors[i3 + 2] = baseColor.b;
        }

        textToPoints(DISPLAY_TEXT);

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.15,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const pointsObj = new THREE.Points(geometry, material);
        scene.add(pointsObj);

        camera.position.z = 100;

        window.addEventListener('mousemove', (e) => {
            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

            const vector = new THREE.Vector3(x, y, 0.5);
            vector.unproject(camera);
            const dir = vector.sub(camera.position).normalize();
            const distance = -camera.position.z / dir.z;
            mouse = camera.position.clone().add(dir.multiplyScalar(distance));
        });

        function animate() {
            requestAnimationFrame(animate);

            const posAttr = geometry.attributes.position;
            const colAttr = geometry.attributes.color;

            const mouseInfluenceRadius = 12;

            let currentLerpSpeed = isInitialLoad ? 0.015 : 0.05;
            const friction = isInitialLoad ? 0.95 : 0.85;

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;

                let tx = targetPositions[i3];
                let ty = targetPositions[i3 + 1];
                let tz = targetPositions[i3 + 2];

                const dx = posAttr.array[i3] - mouse.x;
                const dy = posAttr.array[i3 + 1] - mouse.y;
                const dz = posAttr.array[i3 + 2] - mouse.z;
                const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

                if (dist < mouseInfluenceRadius) {
                    const force = (mouseInfluenceRadius - dist) / mouseInfluenceRadius;
                    velocities[i3] += (dx / dist) * force * 1.5;
                    velocities[i3 + 1] += (dy / dist) * force * 1.5;
                    velocities[i3 + 2] += (dz / dist) * force * 1.5;

                    colAttr.array[i3] += (goldColor.r - colAttr.array[i3]) * 0.2;
                    colAttr.array[i3 + 1] += (goldColor.g - colAttr.array[i3 + 1]) * 0.2;
                    colAttr.array[i3 + 2] += (goldColor.b - colAttr.array[i3 + 2]) * 0.2;
                } else {
                    colAttr.array[i3] += (baseColor.r - colAttr.array[i3]) * 0.05;
                    colAttr.array[i3 + 1] += (baseColor.g - colAttr.array[i3 + 1]) * 0.05;
                    colAttr.array[i3 + 2] += (baseColor.b - colAttr.array[i3 + 2]) * 0.05;
                }

                velocities[i3] *= friction;
                velocities[i3 + 1] *= friction;
                velocities[i3 + 2] *= friction;

                posAttr.array[i3] += velocities[i3];
                posAttr.array[i3 + 1] += velocities[i3 + 1];
                posAttr.array[i3 + 2] += velocities[i3 + 2];

                posAttr.array[i3] += (tx - posAttr.array[i3]) * currentLerpSpeed;
                posAttr.array[i3 + 1] += (ty - posAttr.array[i3 + 1]) * currentLerpSpeed;
                posAttr.array[i3 + 2] += (tz - posAttr.array[i3 + 2]) * currentLerpSpeed;
            }

            posAttr.needsUpdate = true;
            colAttr.needsUpdate = true;

            pointsObj.rotation.y *= 0.9;

            renderer.render(scene, camera);
        }

        window.addEventListener('load', () => {
            animate();
            setTimeout(() => {
                isInitialLoad = false;
            }, 4000);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
